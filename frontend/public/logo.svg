<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="50%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" fill="#0f172a" stroke="url(#grad)" stroke-width="3"/>
  <!-- Dollar sign (proprietary cost) crossed out -->
  <text x="36" y="72" font-family="monospace" font-size="42" font-weight="bold" fill="#f97316" opacity="0.5">$</text>
  <line x1="28" y1="78" x2="56" y2="38" stroke="#ef4444" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <!-- Arrow -->
  <path d="M 58 60 L 82 60" stroke="url(#arrow)" stroke-width="4" stroke-linecap="round"/>
  <polygon points="82,54 94,60 82,66" fill="#34d399"/>
  <!-- Small open model icon -->
  <circle cx="82" cy="44" r="6" fill="none" stroke="#34d399" stroke-width="2"/>
  <circle cx="82" cy="44" r="2" fill="#34d399"/>
</svg>
